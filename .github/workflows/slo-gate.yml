name: SLO Gate

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  slo-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Lean toolchain
        run: |
          wget https://github.com/leanprover/lean4/releases/download/v4.7.0/lean-4.7.0-linux.tar.gz
          tar -xzf lean-4.7.0-linux.tar.gz
          echo "$PWD/lean-4.7.0-linux/bin" >> "$GITHUB_PATH"
      - name: Benchmark gate
        run: lake exe benchmarks
      - name: Observability gate
        run: lake exe observability
      - name: Validation gate
        run: lake exe validate
