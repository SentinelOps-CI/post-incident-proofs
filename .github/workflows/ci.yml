name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build, Test, Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Lean toolchain
        run: |
          wget https://github.com/leanprover/lean4/releases/download/v4.7.0/lean-4.7.0-linux.tar.gz
          tar -xzf lean-4.7.0-linux.tar.gz
          echo "$PWD/lean-4.7.0-linux/bin" >> "$GITHUB_PATH"
      - name: Build
        run: lake build
      - name: Unit and integration tests
        run: lake exe tests
      - name: Security checks
        run: lake exe security
      - name: Observability checks
        run: lake exe observability
      - name: System validation
        run: lake exe validate

  benchmark:
    name: Benchmark Gate
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Lean toolchain
        run: |
          wget https://github.com/leanprover/lean4/releases/download/v4.7.0/lean-4.7.0-linux.tar.gz
          tar -xzf lean-4.7.0-linux.tar.gz
          echo "$PWD/lean-4.7.0-linux/bin" >> "$GITHUB_PATH"
      - name: Run benchmarks
        run: lake exe benchmarks

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dependency review
        uses: actions/dependency-review-action@v4
